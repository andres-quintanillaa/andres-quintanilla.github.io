<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flora Marinha: Os Jardins Submersos</title>
    <style>
        :root {
            --azul-profundo: #0d2b45;
            --azul-oceano: #203c56;
            --verde-alga: #54b2a4;
            --verde-claro: #8fe3d3;
            --branco-gelo: #f4f9f9;
            --texto-escuro: #2b2b2b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--branco-gelo);
            color: var(--texto-escuro);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, var(--azul-profundo), var(--azul-oceano));
            color: white;
            text-align: center;
            padding: 4rem 1rem;
            position: relative;
            border-bottom: 4px solid var(--verde-alga);
        }

        header h1 {
            font-size: 2.8rem;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        header p {
            font-size: 1.2rem;
            opacity: 0.8;
            max-width: 600px;
            margin: 0 auto;
        }

        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        /* Seção de Destaque / Estatísticas */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-bottom: 4px solid var(--verde-alga);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }
